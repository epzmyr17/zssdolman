<!DOCTYPE html>
<html>
	<head>
	<meta charset="utf-8">
	<title>OneLook DTD Create Request</title>
	<script
		id="sap-ui-bootstrap"
		src="../resources/sap-ui-core.js"
		data-sap-ui-theme="sap_belize"
		data-sap-ui-libs="sap.m"
		data-sap-ui-resourceroots='{
			"com.globe.OneLook_CreateDTDRequest": "../"
		}'
		data-sap-ui-compatVersion="edge"
		data-sap-ui-async="true">
	</script>
	<script>
		sap.ui.getCore().attachInit(function () {
			sap.ui.require([
				"com/globe/OneLook_CreateDTDRequest/localService/mockserver",
				"sap/m/Shell",
				"sap/ui/core/ComponentContainer"
			], function (mockserver, Shell, ComponentContainer) {
				mockserver.init();
				new Shell({
					app : new ComponentContainer({
						name : "com.globe.OneLook_CreateDTDRequest",
						settings : {
							id : "vsmcash"
						}
					})
				}).placeAt("content");
			});
		});
	</script>
</head>
<body class="sapUiBody" id="content">
</body>
</html>
